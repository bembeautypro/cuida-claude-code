<!-- @dsCard group="Type" viewport="700x300" name="Escala tipográfica" subtitle="Plus Jakarta Sans — display a xs, ajustada para mobile" -->
<!doctype html>
<html lang="pt-BR" data-palette="acolhimento">
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
  body { margin: 0; background: var(--c-bg); font-family: var(--font-body); color: var(--c-text); }
  .wrap { padding: 24px 26px; display: flex; flex-direction: column; gap: 14px; }
  .row { display: flex; align-items: baseline; gap: 16px; }
  .tag { width: 86px; flex-shrink: 0; font-size: 11px; color: var(--c-text-muted); font-family: ui-monospace, Menlo, monospace; }
  .spec { font-family: var(--font-display); letter-spacing: -0.02em; line-height: 1.05; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="row"><span class="tag">display · 40</span><span class="spec" style="font-size:var(--fs-display);font-weight:600">Cuida de quem cuida</span></div>
    <div class="row"><span class="tag">h1 · 32</span><span class="spec" style="font-size:var(--fs-h1);font-weight:600">Remédios em dia</span></div>
    <div class="row"><span class="tag">h2 · 24</span><span class="spec" style="font-size:var(--fs-h2);font-weight:600">Próxima consulta</span></div>
    <div class="row"><span class="tag">h3 · 20</span><span class="spec" style="font-size:var(--fs-h3);font-weight:500">Losartana 50mg</span></div>
    <div class="row"><span class="tag">body · 15</span><span style="font-size:var(--fs-body)">Tomar 1 comprimido pela manhã, com água.</span></div>
    <div class="row"><span class="tag">sm · 13</span><span style="font-size:var(--fs-sm);color:var(--c-text-soft)">Atualizado há 2 horas</span></div>
    <div class="row"><span class="tag">xs · 11</span><span style="font-size:var(--fs-xs);color:var(--c-text-muted)">18 comprimidos restantes</span></div>
  </div>
</body>
</html>
