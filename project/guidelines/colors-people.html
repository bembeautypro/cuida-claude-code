<!-- @dsCard group="Colors" viewport="700x150" name="Tons de pessoa" subtitle="Tints fixos de avatar — cada familiar tem o seu" -->
<!doctype html>
<html lang="pt-BR" data-palette="acolhimento">
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
  body { margin: 0; background: var(--c-bg); font-family: var(--font-body); color: var(--c-text); }
  .wrap { padding: 22px; display: flex; gap: 18px; align-items: center; }
  .av { width: 56px; height: 56px; border-radius: 50%; display: grid; place-items: center;
        font-family: var(--font-display); font-weight: 600; font-size: 20px; }
  .col { text-align: center; }
  .lab { font-size: 11px; color: var(--c-text-muted); margin-top: 8px; font-family: ui-monospace, Menlo, monospace; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="col"><div class="av" style="background:rgb(254,220,195);color:rgb(122,60,38)">M</div><div class="lab">peach</div></div>
    <div class="col"><div class="av" style="background:rgb(212,232,230);color:rgb(1,55,61)">J</div><div class="lab">sage</div></div>
    <div class="col"><div class="av" style="background:rgb(218,235,222);color:rgb(35,100,68)">C</div><div class="lab">mint</div></div>
    <div class="col"><div class="av" style="background:rgb(252,224,213);color:rgb(170,60,38)">R</div><div class="lab">coral</div></div>
    <div class="col"><div class="av" style="background:rgb(232,220,240);color:rgb(92,60,120)">P</div><div class="lab">lilac</div></div>
  </div>
</body>
</html>
