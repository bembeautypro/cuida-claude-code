<!-- @dsCard group="Spacing" viewport="700x150" name="Espaçamento · base 8pt" subtitle="--s-1 … --s-9, escala de 4 a 56px" -->
<!doctype html>
<html lang="pt-BR" data-palette="acolhimento">
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
  body { margin: 0; background: var(--c-bg); font-family: var(--font-body); color: var(--c-text); }
  .wrap { padding: 26px; display: flex; align-items: flex-end; gap: 16px; }
  .col { text-align: center; }
  .box { background: var(--c-accent-soft); border-radius: var(--r-xs); }
  .lab { font-size: 10.5px; color: var(--c-text-muted); margin-top: 8px; font-family: ui-monospace, Menlo, monospace; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="col"><div class="box" style="width:var(--s-1);height:var(--s-1)"></div><div class="lab">1·4</div></div>
    <div class="col"><div class="box" style="width:var(--s-2);height:var(--s-2)"></div><div class="lab">2·8</div></div>
    <div class="col"><div class="box" style="width:var(--s-3);height:var(--s-3)"></div><div class="lab">3·12</div></div>
    <div class="col"><div class="box" style="width:var(--s-4);height:var(--s-4)"></div><div class="lab">4·16</div></div>
    <div class="col"><div class="box" style="width:var(--s-5);height:var(--s-5)"></div><div class="lab">5·20</div></div>
    <div class="col"><div class="box" style="width:var(--s-6);height:var(--s-6)"></div><div class="lab">6·24</div></div>
    <div class="col"><div class="box" style="width:var(--s-7);height:var(--s-7)"></div><div class="lab">7·32</div></div>
    <div class="col"><div class="box" style="width:var(--s-8);height:var(--s-8)"></div><div class="lab">8·40</div></div>
    <div class="col"><div class="box" style="width:var(--s-9);height:var(--s-9)"></div><div class="lab">9·56</div></div>
  </div>
</body>
</html>
