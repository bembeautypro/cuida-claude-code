<!-- @dsCard group="Type" viewport="700x150" name="Pesos & estilo" subtitle="300–700 + itálico para ênfase de marca" -->
<!doctype html>
<html lang="pt-BR" data-palette="acolhimento">
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
  body { margin: 0; background: var(--c-bg); font-family: var(--font-display); color: var(--c-text); }
  .wrap { padding: 24px 26px; display: flex; flex-wrap: wrap; gap: 26px 34px; align-items: baseline; }
  .item { text-align: center; }
  .big { font-size: 30px; letter-spacing: -0.02em; }
  .lab { font-size: 11px; color: var(--c-text-muted); margin-top: 4px; font-family: ui-monospace, Menlo, monospace; }
  .em { font-style: italic; font-weight: 500; color: var(--c-accent); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="item"><div class="big" style="font-weight:300">cuida</div><div class="lab">300 light</div></div>
    <div class="item"><div class="big" style="font-weight:400">cuida</div><div class="lab">400 regular</div></div>
    <div class="item"><div class="big" style="font-weight:500">cuida</div><div class="lab">500 medium</div></div>
    <div class="item"><div class="big" style="font-weight:600">cuida</div><div class="lab">600 semibold</div></div>
    <div class="item"><div class="big" style="font-weight:700">cuida</div><div class="lab">700 bold</div></div>
    <div class="item"><div class="big em">cuidar</div><div class="lab">italic · ênfase</div></div>
  </div>
</body>
</html>
