<!-- @dsCard group="Components" viewport="700x260" name="Navigation" subtitle="ScreenHeader + TabBar (shell do app)" -->
<!doctype html>
<html lang="pt-BR" data-palette="acolhimento">
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../../styles.css"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  body { margin: 0; background: var(--c-bg); font-family: var(--font-body); color: var(--c-text); }
  .wrap { padding: 22px; }
  .frame { position: relative; width: 360px; height: 200px; border-radius: 28px; overflow: hidden; border: 1px solid var(--c-line); background: var(--c-bg); box-shadow: var(--shadow-md); }
  .cu-eyebrow { font-size: 11px; font-weight: 600; letter-spacing: .12em; text-transform: uppercase; color: var(--c-text-soft); }
  .cu-h1 { font-size: 30px; font-weight: 600; letter-spacing: -0.02em; font-family: var(--font-display); }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
function IconButton({ children, size=42, variant='accent' }) {
  const v = { accent:{background:'var(--c-accent)',color:'var(--c-accent-fg)'}, soft:{background:'var(--c-surface)',color:'var(--c-text)'} }[variant];
  return <button style={{width:size,height:size,borderRadius:999,border:'none',display:'inline-flex',alignItems:'center',justifyContent:'center',cursor:'pointer',...v}}>{children}</button>;
}
function ScreenHeader({ title, eyebrow, action }) {
  return <div style={{padding:'16px 18px 12px',display:'flex',alignItems:'flex-end',justifyContent:'space-between',gap:12}}><div>{eyebrow&&<div className="cu-eyebrow" style={{marginBottom:6}}>{eyebrow}</div>}<div className="cu-h1">{title}</div></div>{action}</div>;
}
const Ico = ({ d, stroke=1.6 }) => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={stroke} strokeLinecap="round" strokeLinejoin="round">{d}</svg>;
const NAV = {
  home:<path d="M3 11l9-7 9 7v9a2 2 0 0 1-2 2h-4v-7h-6v7H5a2 2 0 0 1-2-2z"/>,
  meds:<g><rect x="3" y="9" width="18" height="6" rx="3" transform="rotate(-30 12 12)"/><path d="M9.5 8.5l5 8.5" transform="rotate(-30 12 12)"/></g>,
  stock:<g><path d="M3 8l9-4 9 4-9 4-9-4z"/><path d="M3 8v8l9 4 9-4V8"/><path d="M12 12v8"/></g>,
  emerg:<path d="M12 3l8 3v5c0 5-3.5 9-8 10-4.5-1-8-5-8-10V6l8-3z"/>,
  fam:<g><circle cx="9" cy="9" r="3.5"/><circle cx="17" cy="10" r="2.5"/><path d="M3 19c.5-3 3-5 6-5s5.5 2 6 5"/><path d="M15 19c.4-2 2-3.5 4-3.5s3 .8 3 2"/></g>,
};
function TabBar({ active }) {
  const tabs = [['home','Início'],['meds','Remédios'],['stock','Estoque'],['emerg','SOS'],['fam','Família']];
  return <div style={{position:'absolute',bottom:0,left:0,right:0,padding:'8px 14px 16px',background:'rgba(255,250,242,0.85)',backdropFilter:'blur(20px)',borderTop:'1px solid var(--c-line)',display:'flex',justifyContent:'space-around',alignItems:'flex-end'}}>
    {tabs.map(([id,label])=>{const a=active===id;return <button key={id} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:3,background:'transparent',border:'none',padding:'6px 4px',color:a?'var(--c-accent)':'var(--c-text-muted)',cursor:'pointer',fontFamily:'inherit',fontSize:10,fontWeight:600,minWidth:50}}><Ico d={NAV[id]} stroke={a?2:1.6}/><span>{label}</span></button>;})}
  </div>;
}
const Plus = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"><path d="M12 5v14M5 12h14"/></svg>;
ReactDOM.createRoot(document.getElementById('root')).render(
  <div className="wrap">
    <div className="frame">
      <ScreenHeader eyebrow="Hoje" title="Remédios" action={<IconButton><Plus/></IconButton>}/>
      <TabBar active="meds"/>
    </div>
  </div>
);
</script>
</body>
</html>
