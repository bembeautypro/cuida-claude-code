<!-- @dsCard group="Brand" viewport="700x180" name="Wordmark" subtitle="Lockup cuida — heart · abraço · hand" -->
<!doctype html>
<html lang="pt-BR" data-palette="acolhimento">
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../../styles.css"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  body { margin: 0; background: var(--c-bg); font-family: var(--font-body); }
  .wrap { padding: 30px; display: flex; gap: 40px; align-items: center; flex-wrap: wrap; }
  .dark { background: var(--c-accent); padding: 14px 22px; border-radius: var(--r-lg); }
  .lab { font-size: 11px; color: var(--c-text-muted); margin-top: 10px; text-align: center; font-family: ui-monospace, Menlo, monospace; }
  .col { text-align: center; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
function CuidaWordmark({ size=22, color='currentColor', variant='heart' }) {
  const sym = {
    abraco: <svg width={size+6} height={size+6} viewBox="0 0 32 32"><circle cx="11" cy="16" r="9" fill={color} opacity="0.85"/><circle cx="21" cy="16" r="9" fill={color} opacity="0.55"/></svg>,
    heart: <svg width={size+6} height={size+6} viewBox="0 0 32 32"><path d="M16 27S5 20.5 5 12.5C5 8.4 8.4 5 12.5 5c1.6 0 3 .6 3.5 1.5C16.5 5.6 17.9 5 19.5 5 23.6 5 27 8.4 27 12.5 27 20.5 16 27 16 27z" fill={color}/><path d="M11 14h3l1.5-2.5 2 5L19 14h2" stroke="var(--c-bg)" strokeWidth="1.5" fill="none" strokeLinecap="round" strokeLinejoin="round"/></svg>,
    hand: <svg width={size+6} height={size+6} viewBox="0 0 32 32"><circle cx="16" cy="16" r="13" fill={color} opacity=".18"/><path d="M11 17v-5a1.5 1.5 0 1 1 3 0v3M14 13v-3a1.5 1.5 0 1 1 3 0v3M17 12v-1.5a1.5 1.5 0 1 1 3 0V14M11 14c-1.6.4-2 1.6-2 3l1 5c.5 2 2 3.5 4 3.5h2.5c2.5 0 4.5-2 4.5-4.5V14a1.5 1.5 0 1 0-3 0" stroke={color} strokeWidth="1.5" fill="none" strokeLinecap="round" strokeLinejoin="round"/></svg>,
  }[variant];
  return <span style={{display:'inline-flex',alignItems:'center',gap:8}}>{sym}<span style={{fontFamily:'var(--font-display)',fontWeight:600,fontSize:size,letterSpacing:'-0.02em',color,lineHeight:1}}>cuida</span></span>;
}
ReactDOM.createRoot(document.getElementById('root')).render(
  <div className="wrap">
    <div className="col"><CuidaWordmark size={34} variant="heart" color="var(--c-accent)"/><div className="lab">heart · primário</div></div>
    <div className="col"><CuidaWordmark size={28} variant="abraco" color="var(--c-accent)"/><div className="lab">abraço</div></div>
    <div className="col"><CuidaWordmark size={28} variant="hand" color="var(--c-accent)"/><div className="lab">hand</div></div>
    <div className="col"><div className="dark"><CuidaWordmark size={28} variant="heart" color="var(--c-accent-fg)"/></div><div className="lab">sobre accent</div></div>
  </div>
);
</script>
</body>
</html>
