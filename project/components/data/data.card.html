<!-- @dsCard group="Components" viewport="700x230" name="Data display" subtitle="Avatar · Badge · Pill · Bar · Dot" -->
<!doctype html>
<html lang="pt-BR" data-palette="acolhimento">
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../../styles.css"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  body { margin: 0; background: var(--c-bg); font-family: var(--font-body); color: var(--c-text); }
  .wrap { padding: 22px; display: flex; flex-direction: column; gap: 20px; }
  .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .lab { width: 72px; font-size: 11px; color: var(--c-text-muted); font-family: ui-monospace, Menlo, monospace; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
function Avatar({ name='', color='var(--c-surface)', size=44, fg='var(--c-text)', emoji }) {
  const initials = name.split(' ').filter(Boolean).slice(0,2).map(p=>p[0]).join('').toUpperCase();
  return <div style={{width:size,height:size,borderRadius:'50%',background:color,color:fg,display:'grid',placeItems:'center',fontFamily:'var(--font-display)',fontSize:emoji?size*0.5:size*0.38,fontWeight:600,flexShrink:0}}>{emoji||initials||'?'}</div>;
}
function Badge({ children, tone='neutral', dot=false }) {
  const tones = {
    neutral:{bg:'var(--c-surface)',fg:'var(--c-text-soft)',d:'var(--c-text-muted)'},
    accent:{bg:'var(--c-accent-soft)',fg:'var(--c-accent)',d:'var(--c-accent)'},
    success:{bg:'var(--c-success-soft)',fg:'var(--c-success)',d:'var(--c-success)'},
    alert:{bg:'var(--c-alert-soft)',fg:'var(--c-alert)',d:'var(--c-alert)'},
    warn:{bg:'var(--c-warn-soft)',fg:'var(--c-warn)',d:'var(--c-warn)'},
  };
  const t = tones[tone];
  return <span style={{display:'inline-flex',alignItems:'center',gap:6,padding:'5px 11px',borderRadius:999,background:t.bg,color:t.fg,fontSize:12,fontWeight:600,lineHeight:1}}>{dot&&<span style={{width:6,height:6,borderRadius:'50%',background:t.d}}/>}{children}</span>;
}
function Pill({ children, active, color, fg }) {
  return <button style={{display:'inline-flex',alignItems:'center',gap:6,padding:'8px 14px',borderRadius:999,fontSize:13,fontWeight:500,lineHeight:1,cursor:'pointer',border:'1px solid '+(active?'transparent':'var(--c-line)'),background:active?(color||'var(--c-text)'):'transparent',color:active?(fg||'#fff'):'var(--c-text)',fontFamily:'inherit'}}>{children}</button>;
}
function Bar({ value=0, max=100, color='var(--c-accent)', height=6 }) {
  const pct = Math.min(100,Math.max(0,(value/max)*100));
  return <div style={{height,background:'var(--c-line)',borderRadius:999,overflow:'hidden',width:160}}><div style={{height:'100%',width:pct+'%',background:color,borderRadius:999}}/></div>;
}
function Dot({ color='var(--c-success)', size=8 }) { return <span style={{display:'inline-block',width:size,height:size,borderRadius:'50%',background:color}}/>; }

ReactDOM.createRoot(document.getElementById('root')).render(
  <div className="wrap">
    <div className="row"><span className="lab">Avatar</span>
      <Avatar name="Maria" color="rgb(254,220,195)" fg="rgb(122,60,38)"/>
      <Avatar name="João" color="rgb(212,232,230)" fg="rgb(1,55,61)"/>
      <Avatar name="Carla" color="rgb(218,235,222)" fg="rgb(35,100,68)"/>
      <Avatar emoji="👵" color="var(--c-surface)"/>
    </div>
    <div className="row"><span className="lab">Badge</span>
      <Badge tone="success" dot>Em dia</Badge>
      <Badge tone="alert" dot>Em falta</Badge>
      <Badge tone="warn">Vence em 4 dias</Badge>
      <Badge tone="accent">Receita</Badge>
      <Badge tone="neutral">Arquivado</Badge>
    </div>
    <div className="row"><span className="lab">Pill</span>
      <Pill active>Todos</Pill><Pill>Maria</Pill><Pill>João</Pill>
    </div>
    <div className="row"><span className="lab">Bar</span>
      <Bar value={18} max={30}/><Bar value={4} max={30} color="var(--c-alert)"/>
      <span style={{display:'inline-flex',alignItems:'center',gap:6,fontSize:13}}><Dot/> tomado <Dot color="var(--c-alert)"/> em falta</span>
    </div>
  </div>
);
</script>
</body>
</html>
