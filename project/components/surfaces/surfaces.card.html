<!-- @dsCard group="Components" viewport="700x220" name="Surfaces" subtitle="Card (elevado) + SoftCard (tinto plano)" -->
<!doctype html>
<html lang="pt-BR" data-palette="acolhimento">
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../../styles.css"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  body { margin: 0; background: var(--c-bg); font-family: var(--font-body); color: var(--c-text); }
  .wrap { padding: 22px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
  h3 { margin: 0 0 4px; font-family: var(--font-display); font-size: 17px; font-weight: 600; letter-spacing: -0.01em; }
  p { margin: 0; font-size: 13px; color: var(--c-text-soft); }
  .eb { font-size: 10px; font-weight: 600; letter-spacing: .12em; text-transform: uppercase; color: var(--c-text-soft); margin-bottom: 6px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
function Card({ children, padding=18, radius=22, background='var(--c-card)', shadow=true, style }) {
  return <div style={{background,borderRadius:radius,padding,boxShadow:shadow?'var(--shadow-md)':'none',border:'1px solid var(--c-line)',...style}}>{children}</div>;
}
function SoftCard({ children, padding=18, radius=22, background='var(--c-surface)', style }) {
  return <div style={{background,borderRadius:radius,padding,...style}}>{children}</div>;
}
ReactDOM.createRoot(document.getElementById('root')).render(
  <div className="wrap">
    <Card><h3>Card elevado</h3><p>Sombra suave + borda fina. Container padrão.</p></Card>
    <SoftCard><div className="eb">Plano</div><h3 style={{fontSize:15}}>Bradesco Saúde</h3><p>047.812.099-3</p></SoftCard>
    <SoftCard background="var(--c-accent-soft)"><div className="eb" style={{color:'var(--c-accent)'}}>Tinto</div><p style={{color:'var(--c-accent)',fontWeight:600}}>accent-soft</p></SoftCard>
  </div>
);
</script>
</body>
</html>
