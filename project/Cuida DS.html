<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Cuida · Design System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="cuida/tokens.css">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
/* ── reset ── */
*,*::before,*::after{box-sizing:border-box}
html,body,#root{margin:0;padding:0}
img,svg{display:block;max-width:100%}
h1,h2,h3,h4,p,ul{margin:0;padding:0}
ul{list-style:none}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer}

/* ── base ── */
body{
  font-family:var(--font-body);
  background:#f8f6f0;
  color:var(--c-text);
  font-size:var(--fs-body);
  line-height:var(--lh-body);
  -webkit-font-smoothing:antialiased;
}

/* ── layout ── */
.ds-layout{display:flex;min-height:100vh}

/* ── sidebar ── */
.ds-sidebar{
  width:228px;flex-shrink:0;
  position:sticky;top:0;height:100vh;overflow-y:auto;
  background:var(--c-text);
  padding:28px 0 40px;
  display:flex;flex-direction:column;
  scrollbar-width:none;
}
.ds-sidebar::-webkit-scrollbar{display:none}
.ds-sidebar__logo{
  display:flex;align-items:center;gap:9px;
  padding:0 22px 28px;
  font-family:var(--font-display);
  font-size:18px;font-weight:600;letter-spacing:-0.02em;
  color:var(--c-accent-fg);
  border-bottom:1px solid rgba(254,243,225,.08);
}
.ds-sidebar__badge{
  font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  padding:3px 7px;border-radius:999px;
  background:rgba(254,243,225,.12);color:rgba(254,243,225,.6);
  margin-left:auto;
}
.ds-nav-group{margin-top:24px;padding:0 14px}
.ds-nav-group__label{
  font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;
  color:rgba(254,243,225,.35);
  padding:0 8px 8px;
}
.ds-nav-item{
  display:flex;align-items:center;gap:10px;
  padding:9px 10px;border-radius:10px;
  font-size:13px;font-weight:500;
  color:rgba(254,243,225,.65);
  transition:background .12s ease,color .12s ease;
  text-decoration:none;
}
.ds-nav-item:hover{background:rgba(254,243,225,.07);color:rgba(254,243,225,.9)}
.ds-nav-item.is-active{background:rgba(254,243,225,.12);color:var(--c-accent-fg)}
.ds-nav-item__dot{
  width:18px;height:18px;border-radius:6px;
  background:rgba(254,243,225,.08);
  display:grid;place-items:center;font-size:10px;flex-shrink:0;
}
.ds-sidebar__version{
  margin-top:auto;padding:18px 22px 0;
  font-size:11px;color:rgba(254,243,225,.3);
  border-top:1px solid rgba(254,243,225,.06);
}

/* ── main content ── */
.ds-main{flex:1;overflow-x:hidden;padding:0 0 120px}

/* ── page header ── */
.ds-page-header{
  padding:52px 56px 44px;
  border-bottom:1px solid var(--c-line);
  background:var(--c-card);
}
.ds-page-header__eyebrow{
  font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;
  color:var(--c-text-muted);margin-bottom:10px;
}
.ds-page-header__title{
  font-family:var(--font-display);
  font-size:42px;font-weight:600;letter-spacing:-0.025em;line-height:1.05;
  margin-bottom:10px;
}
.ds-page-header__sub{
  font-size:16px;color:var(--c-text-soft);max-width:560px;line-height:1.5;
}

/* ── section ── */
.ds-section{padding:52px 56px;border-bottom:1px solid var(--c-line)}
.ds-section:nth-child(odd){background:var(--c-card)}
.ds-section:nth-child(even){background:var(--c-bg)}
.ds-section__header{
  display:flex;align-items:baseline;justify-content:space-between;
  margin-bottom:28px;gap:16px;
}
.ds-section__title{
  font-family:var(--font-display);
  font-size:24px;font-weight:600;letter-spacing:-0.018em;
}
.ds-section__num{
  font-family:ui-monospace,Menlo,monospace;
  font-size:11px;color:var(--c-text-muted);letter-spacing:.06em;
}
.ds-section__desc{
  font-size:14px;color:var(--c-text-soft);max-width:640px;margin-bottom:32px;line-height:1.55;
}

/* ── util ── */
.ds-mono{font-family:ui-monospace,Menlo,monospace;font-size:11px;color:var(--c-text-muted);letter-spacing:.03em}
.ds-label{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--c-text-soft);margin-bottom:8px}
.ds-grid{display:flex;flex-wrap:wrap;gap:12px;align-items:flex-start}
.ds-col{display:flex;flex-direction:column;gap:32px}
.ds-spec-row{
  display:grid;grid-template-columns:140px 1fr 220px;
  gap:24px;align-items:baseline;
  padding:20px 0;border-bottom:1px solid var(--c-line);
}
.ds-spec-row:last-child{border-bottom:none}

/* ── swatches ── */
.ds-swatch-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.ds-swatch{border-radius:var(--r-md);overflow:hidden;border:1px solid var(--c-line);background:var(--c-card)}
.ds-swatch__chip{height:120px;position:relative}
.ds-swatch__on-dark{
  position:absolute;bottom:8px;right:8px;
  font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  background:rgba(0,0,0,.2);color:#fff;padding:3px 7px;border-radius:999px;
}
.ds-swatch__body{padding:12px 14px}
.ds-swatch__name{font-size:14px;font-weight:600;margin-bottom:2px}
.ds-swatch__token{font-family:ui-monospace,Menlo,monospace;font-size:10px;color:var(--c-accent);margin-bottom:1px}
.ds-swatch__val{font-family:ui-monospace,Menlo,monospace;font-size:10px;color:var(--c-text-muted)}
.ds-swatch__usage{font-size:11px;color:var(--c-text-soft);margin-top:6px;line-height:1.4}

/* semantic colours */
.ds-sem-row{
  display:flex;align-items:center;gap:16px;
  padding:14px 18px;border-radius:14px;
  border:1px solid var(--c-line);
  background:var(--c-card);
  margin-bottom:8px;
}
.ds-sem-chip{width:36px;height:36px;border-radius:10px;flex-shrink:0}
.ds-sem-name{font-size:14px;font-weight:600;flex:1}
.ds-sem-token{font-family:ui-monospace,Menlo,monospace;font-size:11px;color:var(--c-text-muted)}

/* ── radii ── */
.ds-radii{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
.ds-radius{
  background:var(--c-surface);
  height:100px;display:grid;place-items:center;
  font-family:ui-monospace,Menlo,monospace;font-size:11px;color:var(--c-text-soft);
  text-align:center;line-height:1.5;
  transition:background .15s;
}
.ds-radius:hover{background:var(--c-accent-soft)}

/* ── spacing ── */
.ds-spacing{display:flex;flex-direction:column;gap:10px}
.ds-spacing-row{display:grid;grid-template-columns:90px 1fr 110px;gap:16px;align-items:center}
.ds-spacing-bar{height:14px;background:var(--c-accent);border-radius:999px;transition:width .3s}
.ds-spacing-val{font-family:ui-monospace,Menlo,monospace;font-size:11px;color:var(--c-text-muted);text-align:right}

/* ── shadows ── */
.ds-shadows{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.ds-shadow-card{
  background:var(--c-card);border-radius:var(--r-card);
  height:110px;display:grid;place-items:center;
  font-size:13px;font-weight:600;
}

/* ── type ── */
.ds-type-scale{display:flex;flex-direction:column;gap:0}

/* ── icons ── */
.ds-icon-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:8px}
.ds-icon-tile{
  display:flex;flex-direction:column;align-items:center;gap:6px;
  padding:14px 8px;border-radius:12px;
  background:var(--c-card);border:1px solid var(--c-line);
  text-align:center;
  transition:background .12s,transform .12s;cursor:default;
}
.ds-icon-tile:hover{background:var(--c-surface);transform:translateY(-2px)}
.ds-icon-tile__name{font-family:ui-monospace,Menlo,monospace;font-size:9px;color:var(--c-text-muted);letter-spacing:.03em;line-height:1.3}

/* ── component examples ── */
.ds-example{
  background:var(--c-surface);border-radius:var(--r-lg);
  padding:32px;
  display:flex;flex-direction:column;gap:12px;
  margin-bottom:28px;
  position:relative;
}
.ds-example__label{
  position:absolute;top:12px;right:14px;
  font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;
  color:var(--c-text-muted);
}

/* ── input ── */
.ds-input{
  width:100%;padding:12px 14px;
  font-size:14px;font-family:inherit;
  color:var(--c-text);background:var(--c-card);
  border:1.5px solid var(--c-line);border-radius:12px;
  outline:none;transition:border-color .15s,box-shadow .15s;
}
.ds-input:focus{border-color:var(--c-accent);box-shadow:0 0 0 3px rgba(1,55,61,.08)}
.ds-input--error{border-color:var(--c-alert)!important}
.ds-input--success{border-color:var(--c-success)!important}
.ds-input::placeholder{color:var(--c-text-muted)}
.ds-input-wrap{position:relative}
.ds-input-icon{position:absolute;right:12px;top:50%;transform:translateY(-50%);pointer-events:none}
.ds-input-hint{font-size:11px;color:var(--c-text-muted);margin-top:4px;padding-left:2px}
.ds-input-hint--error{color:var(--c-alert)}
.ds-input-hint--success{color:var(--c-success)}

/* ── do/dont ── */
.ds-guidance{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:20px}
.ds-do,.ds-dont{border-radius:var(--r-md);overflow:hidden;border:1.5px solid var(--c-line)}
.ds-do{border-color:var(--c-success)}
.ds-dont{border-color:var(--c-alert)}
.ds-do__header,.ds-dont__header{
  padding:8px 14px;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
}
.ds-do__header{background:var(--c-success-soft);color:var(--c-success)}
.ds-dont__header{background:var(--c-alert-soft);color:var(--c-alert)}
.ds-do__body,.ds-dont__body{padding:18px;background:var(--c-card);font-size:13px;line-height:1.5;color:var(--c-text-soft)}

/* ── scroll spy highlight ── */
:target{scroll-margin-top:24px}
</style>
</head>
<body data-palette="acolhimento">
<div id="root"></div>

<script type="text/babel" src="cuida/icons.jsx"></script>
<script type="text/babel" src="cuida/ui.jsx"></script>
<script type="text/babel" src="cuida/data.jsx"></script>

<script type="text/babel">
const { useState: useStateDS, useEffect: useEffectDS } = React;

// ─── SIDEBAR ───────────────────────────────────────────────
const NAV = [
  { group: 'Fundação',   items: [
    { id: 'cores',       label: 'Cores',         icon: '🎨' },
    { id: 'tipo',        label: 'Tipografia',    icon: 'Aa' },
    { id: 'espaco',      label: 'Espaçamento',   icon: '⬜' },
    { id: 'forma',       label: 'Forma',         icon: '▢'  },
    { id: 'sombras',     label: 'Sombras',       icon: '◻'  },
  ]},
  { group: 'Primitivos', items: [
    { id: 'icones',      label: 'Ícones',        icon: '◇'  },
    { id: 'marca',       label: 'Marca',         icon: '♥'  },
  ]},
  { group: 'Componentes', items: [
    { id: 'botoes',      label: 'Botões',        icon: '⬡'  },
    { id: 'inputs',      label: 'Inputs',        icon: '☐'  },
    { id: 'avatares',    label: 'Avatares',      icon: '◉'  },
    { id: 'chips',       label: 'Chips & Badges',icon: '◈'  },
    { id: 'cards',       label: 'Cards',         icon: '▭'  },
    { id: 'feedback',    label: 'Feedback',      icon: '△'  },
    { id: 'nav',         label: 'Navegação',     icon: '≡'  },
    { id: 'progress',    label: 'Progress',      icon: '▬'  },
  ]},
  { group: 'Padrões', items: [
    { id: 'telas',       label: 'Padrões de tela', icon: '⬚' },
    { id: 'guia',        label: 'Guia de uso',      icon: '◻' },
  ]},
];

function Sidebar({ active }) {
  return (
    <aside className="ds-sidebar">
      <div className="ds-sidebar__logo">
        <window.BrandMark size={22} style={{ color: 'var(--c-accent-fg)' }}/>
        cuida
        <span className="ds-sidebar__badge">DS 1.0</span>
      </div>
      {NAV.map(group => (
        <div className="ds-nav-group" key={group.group}>
          <div className="ds-nav-group__label">{group.group}</div>
          {group.items.map(item => (
            <a
              key={item.id}
              href={'#' + item.id}
              className={'ds-nav-item' + (active === item.id ? ' is-active' : '')}
            >
              <span className="ds-nav-item__dot">{item.icon}</span>
              {item.label}
            </a>
          ))}
        </div>
      ))}
      <div className="ds-sidebar__version">
        v1.0 · Mai 2026<br/>
        Plus Jakarta Sans<br/>
        Tokens CSS Variables
      </div>
    </aside>
  );
}

// ─── SECTION WRAPPER ───────────────────────────────────────
function Section({ id, num, title, desc, children }) {
  return (
    <section className="ds-section" id={id}>
      <div className="ds-section__header">
        <h2 className="ds-section__title">{title}</h2>
        <span className="ds-section__num">{num}</span>
      </div>
      {desc && <p className="ds-section__desc">{desc}</p>}
      {children}
    </section>
  );
}

// ─── COLORS ────────────────────────────────────────────────
const COLOR_TOKENS = [
  { name: 'Text',           token: '--c-text',         val: 'rgb(38, 37, 37)',    usage: 'Corpo, títulos, ícones ativos' },
  { name: 'Text Soft',      token: '--c-text-soft',    val: 'rgba(38,37,37,.68)', usage: 'Labels secundários, metadata' },
  { name: 'Text Muted',     token: '--c-text-muted',   val: 'rgba(38,37,37,.46)', usage: 'Placeholders, hints, captions' },
  { name: 'Background',     token: '--c-bg',           val: '#fffaf2',            usage: 'Fundo da página e telas' },
  { name: 'Card',           token: '--c-card',         val: '#ffffff',            usage: 'Superfície de cards e inputs' },
  { name: 'Surface',        token: '--c-surface',      val: 'rgb(254, 243, 225)', usage: 'Linho — cards informativos, perfis' },
  { name: 'Accent',         token: '--c-accent',       val: 'rgb(1, 55, 61)',     usage: 'Botão primário, ícones ativos, links', dark: true },
  { name: 'Accent Soft',    token: '--c-accent-soft',  val: 'rgb(212, 232, 230)', usage: 'Fundo de ícones, badges, hover' },
  { name: 'Accent Fg',      token: '--c-accent-fg',    val: 'rgb(254, 243, 225)', usage: 'Texto sobre --c-accent' },
  { name: 'Line',           token: '--c-line',         val: 'rgba(38,37,37,.10)', usage: 'Bordas, divisores', border: true },
  { name: 'Line Strong',    token: '--c-line-strong',  val: 'rgba(38,37,37,.18)', usage: 'Bordas em foco, separadores', border: true },
];

const SEMANTIC_TOKENS = [
  { name: 'Success',      token: '--c-success',      bg: 'var(--c-success)',      val: 'rgb(35, 100, 68)' },
  { name: 'Success Soft', token: '--c-success-soft', bg: 'var(--c-success-soft)', val: 'rgb(218, 235, 222)' },
  { name: 'Alert',        token: '--c-alert',        bg: 'var(--c-alert)',        val: 'rgb(170, 60, 38)' },
  { name: 'Alert Soft',   token: '--c-alert-soft',   bg: 'var(--c-alert-soft)',   val: 'rgb(252, 224, 213)' },
  { name: 'Warn',         token: '--c-warn',         bg: 'var(--c-warn)',         val: 'rgb(180, 110, 30)' },
  { name: 'Warn Soft',    token: '--c-warn-soft',    bg: 'var(--c-warn-soft)',    val: 'rgb(253, 233, 200)' },
];

function Colors() {
  return (
    <Section id="cores" num="01" title="Cores"
      desc="Paleta Acolhimento — warm near-black sobre cream, accent em teal escuro. Todo uso de cor passa por um CSS custom property; nunca hardcode valores hex.">

      <div className="ds-swatch-grid">
        {COLOR_TOKENS.map(c => (
          <div className="ds-swatch" key={c.token}>
            <div className="ds-swatch__chip" style={{
              background: c.val,
              border: c.border ? '1px dashed var(--c-line-strong)' : 'none',
            }}>
              {c.dark && <span className="ds-swatch__on-dark">On-dark: --c-accent-fg</span>}
            </div>
            <div className="ds-swatch__body">
              <div className="ds-swatch__name">{c.name}</div>
              <div className="ds-swatch__token">{c.token}</div>
              <div className="ds-swatch__val">{c.val}</div>
              <div className="ds-swatch__usage">{c.usage}</div>
            </div>
          </div>
        ))}
      </div>

      <h3 style={{ fontSize: 16, fontWeight: 600, margin: '36px 0 16px', letterSpacing: '-0.01em' }}>
        Cores semânticas
      </h3>
      {SEMANTIC_TOKENS.map(s => (
        <div className="ds-sem-row" key={s.token}>
          <div className="ds-sem-chip" style={{ background: s.bg }}/>
          <div className="ds-sem-name">{s.name}</div>
          <div className="ds-sem-token">{s.token}</div>
          <div className="ds-sem-token">{s.val}</div>
        </div>
      ))}
    </Section>
  );
}

// ─── TYPOGRAPHY ─────────────────────────────────────────────
const TYPE_SCALE = [
  { label: 'Display',   size: '40px',  weight: 600, ls: '-0.025em', lh: '1.05', token: '--fs-display',  usage: 'Tela de boas-vindas, hero da landing' },
  { label: 'H1',        size: '32px',  weight: 600, ls: '-0.02em',  lh: '1.1',  token: '--fs-h1',       usage: 'Títulos de seção grande' },
  { label: 'H2',        size: '24px',  weight: 600, ls: '-0.015em', lh: '1.15', token: '--fs-h2',       usage: 'Subtítulos dentro de telas' },
  { label: 'H3',        size: '20px',  weight: 500, ls: '-0.01em',  lh: '1.2',  token: '--fs-h3',       usage: 'Cabeçalhos de cards, modais' },
  { label: 'Large',     size: '17px',  weight: 400, ls: '0',        lh: '1.4',  token: '--fs-lg',       usage: 'Corpo de copy primário, lead text' },
  { label: 'Body',      size: '15px',  weight: 400, ls: '0',        lh: '1.45', token: '--fs-body',     usage: 'Padrão do app, labels de campo' },
  { label: 'Small',     size: '13px',  weight: 400, ls: '0',        lh: '1.4',  token: '--fs-sm',       usage: 'Metadata, timestamps, hints' },
  { label: 'XSmall',    size: '11px',  weight: 600, ls: '0.12em',   lh: '1.3',  token: '--fs-xs',       usage: 'Eyebrow, tab bar label, badge', upper: true },
];

function Typography() {
  return (
    <Section id="tipo" num="02" title="Tipografia"
      desc="Plus Jakarta Sans em todos os pesos. Body usa 400 (regular); Display e headings usam 600 (semibold). Nunca use peso abaixo de 400 em telas.">
      <div className="ds-type-scale">
        {TYPE_SCALE.map(t => (
          <div className="ds-spec-row" key={t.label}>
            <div className="ds-label">{t.label}</div>
            <div style={{
              fontFamily: 'var(--font-display)',
              fontSize: t.size, fontWeight: t.weight,
              letterSpacing: t.ls, lineHeight: t.lh,
              textTransform: t.upper ? 'uppercase' : 'none',
              color: 'var(--c-text)',
            }}>
              {t.upper ? 'EYEBROW LABEL' : 'O cuidado como prioridade'}
            </div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 3 }}>
              <div className="ds-mono">{t.token}</div>
              <div className="ds-mono">{t.size} / {t.weight} / {t.lh} lh</div>
              <div style={{ fontSize: 11, color: 'var(--c-text-soft)', marginTop: 2, lineHeight: 1.4 }}>{t.usage}</div>
            </div>
          </div>
        ))}
      </div>

      <div className="ds-guidance">
        <div className="ds-do">
          <div className="ds-do__header">✓ Faça</div>
          <div className="ds-do__body">
            Use peso 600 apenas em títulos e CTAs. Use 400 no corpo. Headings sempre com <code>letter-spacing</code> negativo acima de 18px.
          </div>
        </div>
        <div className="ds-dont">
          <div className="ds-dont__header">✕ Evite</div>
          <div className="ds-dont__body">
            Nunca use peso 300 no app (só aceitável em landpages em telas grandes). Não misture mais de 2 tamanhos em uma mesma linha de texto.
          </div>

  const [sel, setSel] = useStateDS([]);
  const toggle = (v) => setSel(p => p.includes(v) ? p.filter(x => x !== v) : [...p, v]);
  return (
    <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8, marginTop: 8 }}>
      {opts.map(o => (
        <button key={o} onClick={() => toggle(o)} style={{
          padding: '9px 16px', borderRadius: 999,
          fontSize: 13, fontWeight: 500, lineHeight: 1,
          border: '1.5px solid ' + (sel.includes(o) ? 'var(--c-accent)' : 'var(--c-line-strong)'),
          background: sel.includes(o) ? 'var(--c-accent)' : 'transparent',
          color: sel.includes(o) ? 'var(--c-accent-fg)' : 'var(--c-text)',
          cursor: 'pointer', fontFamily: 'inherit',
          transition: 'all .15s ease',

      ))}
    </div>
  );
}

// ─── ROOT ─────────────────────────────────────────────────────
function DSRoot() {
  const [active, setActive] = useStateDS('cores');

  useEffectDS(() => {
    const observer = new IntersectionObserver(
      entries => {
        entries.forEach(e => { if (e.isIntersecting) setActive(e.target.id); });
      },
      { rootMargin: '-40% 0px -55% 0px' }
    );
    document.querySelectorAll('.ds-section').forEach(el => observer.observe(el));
    return () => observer.disconnect();
  }, []);

  return (
    <div className="ds-layout">
      <Sidebar active={active}/>
      <main className="ds-main">
        <div className="ds-page-header">
          <div className="ds-page-header__eyebrow">Cuida · Design System</div>
          <h1 className="ds-page-header__title">cuida DS · v1.0</h1>
          <p className="ds-page-header__sub">
            Tokens, componentes e padrões de UX do app Cuida. Toda implementação começa aqui.
            Paleta: <strong>Acolhimento</strong> · Tipografia: <strong>Plus Jakarta Sans</strong> · Plataforma: <strong>iOS + Android</strong>
          </p>
        </div>
        <Colors/>
        <Typography/>
        <Spacing/>
        <Shape/>
        <Shadows/>
        <Icons/>
        <Marca/>
        <Buttons/>
        <Inputs/>
        <Avatares/>
        <Chips/>
        <Cards/>
        <Feedback/>
        <Navigation/>
        <Progress/>
        <TelaPatterns/>
        <Guia/>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<DSRoot/>);
</script>
